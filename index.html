<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #0b0f14;
      --bg-soft: #121922;
      --card: #171f2b;
      --text: #e8eef7;
      --muted: #98a7bd;
      --line: #273244;
      --accent: #5ab3ff;
      --accent-2: #86ffd0;
      --danger: #ff7b7b;
      --shadow: 0 18px 50px rgba(0,0,0,.35);
      --radius: 18px;
      --max: 1120px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(90,179,255,.12), transparent 28%),
        radial-gradient(circle at top left, rgba(134,255,208,.08), transparent 22%),
        var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    a { color: inherit; text-decoration: none; }
    .wrap { width: min(calc(100% - 32px), var(--max)); margin: 0 auto; }

    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(12px);
      background: rgba(11,15,20,.75);
      border-bottom: 1px solid rgba(255,255,255,.05);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: .2px;
    }

    .brand-badge {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #081018;
      font-weight: 900;
      box-shadow: var(--shadow);
    }

    .nav-links {
      display: flex;
      gap: 18px;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 13px 18px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #111823;
      color: var(--text);
      font-weight: 700;
      transition: .18s ease;
      cursor: pointer;
    }

    .btn:hover { transform: translateY(-1px); border-color: #3a4a63; }
    .btn.primary {
      background: linear-gradient(135deg, var(--accent), #3f8cff);
      color: #081018;
      border: none;
      box-shadow: 0 10px 30px rgba(63,140,255,.28);
    }

    .hero {
      padding: 72px 0 42px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.08fr .92fr;
      gap: 28px;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 999px;
      color: var(--accent-2);
      background: rgba(255,255,255,.02);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2.4rem, 5vw, 4.6rem);
      line-height: .96;
      letter-spacing: -1.8px;
    }

    .lead {
      font-size: 1.08rem;
      color: var(--muted);
      max-width: 680px;
      margin-bottom: 24px;
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 18px;
    }

    .subtext {
      font-size: 14px;
      color: var(--muted);
    }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 26px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .terminal {
      border: 1px solid #1e2a3b;
      border-radius: 20px;
      padding: 18px;
      min-height: 390px;
    }

    .dots { display: flex; gap: 7px; margin-bottom: 14px; }
    .dot { width: 10px; height: 10px; border-radius: 999px; background: #2d3a4e; }
    .dot:nth-child(1){ background: #ff7b7b; }
    .dot:nth-child(2){ background: #ffd166; }
    .dot:nth-child(3){ background: #86ffd0; }

    .log {
      display: grid;
      gap: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
    }

    .log-line {
      padding: 12px 14px;
      border-radius: 14px;
      background: #101a27;
      color: #d7e5f6;
      border: 1px solid #1e2a3b;
    }

    .green { color: var(--accent-2); }
    .blue { color: #84c8ff; }
    .red { color: var(--danger); }

    section { padding: 28px 0; }
    .section-title {
      font-size: clamp(1.65rem, 3vw, 2.3rem);
      margin: 0 0 10px;
      letter-spacing: -.8px;
    }

    .section-copy {
      color: var(--muted);
      max-width: 760px;
      margin: 0 0 22px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .card {
      padding: 20px;
      border-radius: var(--radius);
      background: var(--card);
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: var(--shadow);
    }

    .card h3 { margin: 0 0 8px; font-size: 1.05rem; }
    .card p { margin: 0; color: var(--muted); }

    .steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .step-num {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-weight: 900;
      margin-bottom: 12px;
      background: rgba(90,179,255,.18);
      color: #a9d8ff;
    }

    .faq {
      display: grid;
      gap: 14px;
    }

    details {
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 16px;
      padding: 16px 18px;
      background: rgba(255,255,255,.02);
    }

    summary {
      cursor: pointer;
      font-weight: 700;
    }

    details p {
      color: var(--muted);
      margin: 12px 0 0;
    }

    .cta-box {
      padding: 24px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(90,179,255,.12), rgba(134,255,208,.08));
      border: 1px solid rgba(255,255,255,.08);
      display: flex;
      gap: 18px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    footer {
      padding: 38px 0 60px;
      color: var(--muted);
      font-size: 14px;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .pill {
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.07);
      color: var(--muted);
      background: rgba(255,255,255,.02);
      font-size: 13px;
      font-weight: 700;
    }

    @media (max-width: 920px) {
      .hero-grid,
      .grid-3,
      .steps { grid-template-columns: 1fr; }
      .nav-links a:not(.btn) { display: none; }
      .hero { padding-top: 42px; }
    }
  </style>

  <!--
    STEP 1: Replace G-XXXXXXXXXX below with your Google tag ID.
    If you already have a Google tag in another template/header, do not paste a duplicate.
  -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <!--
    STEP 2: Replace the send_to value below with your Google Ads conversion ID/label.
    Example format: AW-123456789/AbCdEfGhIjKlMnOpQr
  -->
  <script>
    function gtag_report_conversion(url) {
      var callback = function () {
        if (typeof(url) !== 'undefined') {
          window.location = url;
        }
      };
      gtag('event', 'conversion', {
        'send_to': 'AW-123456789/REPLACE_ME',
        'event_callback': callback
      });
      return false;
    }
  </script>
</head>
<body>
  <nav class="nav">
    <div class="wrap nav-inner">
      <div class="brand">
        <div>RaiderTrader</div>
      </div>
      <div class="nav-links">
        <a href="#features">Features</a>
        <a href="#how">How it works</a>
        <a href="#faq">FAQ</a>
        <a class="btn primary" href="https://discord.gg/REPLACE_INVITE" onclick="return gtag_report_conversion('https://discord.gg/REPLACE_INVITE');">Join Discord</a>
      </div>
    </div>
  </nav>

  <header class="hero">
    <div class="wrap hero-grid">
      <div>
        <p class="lead">
        </p>
        <div class="cta-row">
          <a class="btn" href="#features">See how it works</a>
        </div>
        <div class="pill-row">
        </div>
      </div>

      <div class="panel">
        <div class="terminal">
          <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="log">
          </div>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section id="features">
      <div class="wrap">
        <p class="section-copy">
        </p>
        <div class="grid-3">
          <div class="card">
          </div>
          <div class="card">
          </div>
          <div class="card">
          </div>
        </div>
      </div>
    </section>

    <section id="how">
      <div class="wrap">
        <h2 class="section-title">How it works</h2>
        <div class="steps">
          <div class="card">
            <div class="step-num">1</div>
          </div>
          <div class="card">
            <div class="step-num">2</div>
          </div>
          <div class="card">
            <div class="step-num">3</div>
          </div>
        </div>
      </div>
    </section>

    <section>
      <div class="wrap">
        <div class="cta-box">
          <div>
          </div>
          <a class="btn primary" href="https://discord.gg/REPLACE_INVITE" onclick="return gtag_report_conversion('https://discord.gg/REPLACE_INVITE');">Join Discord</a>
        </div>
      </div>
    </section>

    <section id="faq">
      <div class="wrap">
        <h2 class="section-title">FAQ</h2>
        <div class="faq">
          <details>
            <summary>Is this an official Arc Raiders service?</summary>
            <p>No. It’s a community-run trading service built for players who want more structure and less nonsense when making deals.</p>
          </details>
          <details>
          </details>
          <details>
          </details>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="wrap">
    </div>
  </footer>
</body>
</html>
